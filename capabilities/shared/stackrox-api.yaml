naftiko: "1.0.0-alpha1"

info:
  label: "StackRox API"
  description: "StackRox Kubernetes Security Platform API. Manage alerts, policies, deployments, images, compliance, clusters, and vulnerabilities."
  tags:
    - Kubernetes Security
    - Container Security
    - Compliance
    - Runtime Protection
    - Vulnerability Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STACKROX_API_TOKEN: STACKROX_API_TOKEN
      STACKROX_CENTRAL_HOST: STACKROX_CENTRAL_HOST

capability:
  consumes:
    - type: http
      namespace: stackrox
      baseUri: "https://{{STACKROX_CENTRAL_HOST}}"
      description: "StackRox Kubernetes Security Platform"
      authentication:
        type: apikey
        key: Authorization
        value: "Bearer {{STACKROX_API_TOKEN}}"
        placement: header
      resources:
        - name: alerts
          path: /v1/alerts
          description: "Security policy violation alerts"
          operations:
            - name: list-alerts
              method: GET
              description: "List security alerts (slim version)"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query to filter alerts"
                - name: pagination.limit
                  in: query
                  type: integer
                  required: false
                - name: pagination.offset
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-alert
              method: GET
              description: "Get alert details by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: resolve-alert
              method: PATCH
              description: "Mark an alert as resolved"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data: {}
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deployments
          path: /v1/deployments
          description: "Kubernetes deployments under management"
          operations:
            - name: list-deployments
              method: GET
              description: "List all monitored deployments"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                - name: pagination.limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-deployment
              method: GET
              description: "Get deployment details by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: images
          path: /v1/images
          description: "Container image vulnerability management"
          operations:
            - name: list-images
              method: GET
              description: "List all container images"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-image
              method: GET
              description: "Get image details and vulnerabilities"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: scan-image
              method: POST
              description: "Scan a single image for vulnerabilities"
              body:
                type: json
                data:
                  imageName: "{{tools.image_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policies
          path: /v1/policies
          description: "Security policy management"
          operations:
            - name: list-policies
              method: GET
              description: "List all security policies"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-policy
              method: GET
              description: "Get a security policy by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-policy
              method: POST
              description: "Create a new security policy"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: compliance
          path: /v1/compliance
          description: "Compliance standards and results"
          operations:
            - name: list-compliance-standards
              method: GET
              description: "List available compliance standards (CIS, NIST, PCI-DSS)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-compliance-results
              method: GET
              description: "Get compliance scan results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: clusters
          path: /v1/clusters
          description: "Kubernetes cluster management"
          operations:
            - name: list-clusters
              method: GET
              description: "List all registered Kubernetes clusters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-cluster
              method: GET
              description: "Get cluster details by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-tokens
          path: /v1/apitokens
          description: "API token management"
          operations:
            - name: list-api-tokens
              method: GET
              description: "List all API tokens"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: generate-api-token
              method: POST
              description: "Generate a new API token"
              body:
                type: json
                data:
                  name: "{{tools.token_name}}"
                  role: "{{tools.role}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: roles
          path: /v1/roles
          description: "RBAC role management"
          operations:
            - name: list-roles
              method: GET
              description: "List all RBAC roles"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search
          path: /v1/search
          description: "Universal search across all resources"
          operations:
            - name: search
              method: GET
              description: "Search across all StackRox resources"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "Search query string"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stackrox-rest
      resources:
        - path: /v1/alerts
          name: alerts
          operations:
            - method: GET
              name: list-alerts
              description: "List security alerts"
              call: "stackrox.list-alerts"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/policies
          name: policies
          operations:
            - method: GET
              name: list-policies
              description: "List security policies"
              call: "stackrox.list-policies"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/images
          name: images
          operations:
            - method: GET
              name: list-images
              description: "List container images"
              call: "stackrox.list-images"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stackrox-mcp
      transport: http
      tools:
        - name: list-alerts
          description: "List StackRox security alerts"
          hints:
            readOnly: true
          call: "stackrox.list-alerts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-policies
          description: "List StackRox security policies"
          hints:
            readOnly: true
          call: "stackrox.list-policies"
          outputParameters:
            - type: object
              mapping: "$."

        - name: scan-image
          description: "Scan a container image for vulnerabilities"
          hints:
            readOnly: false
          call: "stackrox.scan-image"
          outputParameters:
            - type: object
              mapping: "$."
