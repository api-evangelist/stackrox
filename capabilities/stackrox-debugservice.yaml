naftiko: 1.0.0-alpha2
info:
  label: API Reference — DebugService
  description: 'API Reference — DebugService. 2 operations. Lead operation: Get the current logging level for StackRox services..
    Self-contained Naftiko capability covering one Stackrox business surface.'
  tags:
  - Stackrox
  - DebugService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKROX_API_KEY: STACKROX_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackrox-debugservice
    baseUri: https://{central-host}
    description: API Reference — DebugService business capability. Self-contained, no shared references.
    resources:
    - name: v1-debug-loglevel
      path: /v1/debug/loglevel
      operations:
      - name: getloglevel
        method: GET
        description: Get the current logging level for StackRox services.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: modules
          in: query
          type: array
      - name: setloglevel
        method: PATCH
        description: Set logging level for StackRox services.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.STACKROX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stackrox-debugservice-rest
    port: 8080
    description: REST adapter for API Reference — DebugService. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/debug/loglevel
      name: v1-debug-loglevel
      description: REST surface for v1-debug-loglevel.
      operations:
      - method: GET
        name: getloglevel
        description: Get the current logging level for StackRox services.
        call: stackrox-debugservice.getloglevel
        with:
          modules: rest.modules
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: setloglevel
        description: Set logging level for StackRox services.
        call: stackrox-debugservice.setloglevel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stackrox-debugservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — DebugService. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-current-logging-level-stackrox
      description: Get the current logging level for StackRox services.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackrox-debugservice.getloglevel
      with:
        modules: tools.modules
      outputParameters:
      - type: object
        mapping: $.
    - name: set-logging-level-stackrox-services
      description: Set logging level for StackRox services.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: stackrox-debugservice.setloglevel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
