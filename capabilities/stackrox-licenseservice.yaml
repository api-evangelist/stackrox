      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: getactivelicenseexpiration
      description: getactivelicenseexpiration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackrox-licenseservice.getactivelicenseexpiration
