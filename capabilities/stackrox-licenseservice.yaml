    resources:
    - name: v1-licenses-add
      path: /v1/licenses/add
      operations:
      - name: addlicense
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-licenses-expiration
      path: /v1/licenses/expiration
      operations:
      - name: getactivelicenseexpiration
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-licenses-list
      path: /v1/licenses/list
      operations:
      - name: getlicenses
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
