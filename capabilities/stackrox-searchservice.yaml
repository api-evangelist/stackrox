naftiko: 1.0.0-alpha2
info:
  label: API Reference — SearchService
  description: 'API Reference — SearchService. 3 operations. Lead operation: SearchService. Self-contained Naftiko capability
    covering one Stackrox business surface.'
  tags:
  - Stackrox
  - SearchService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKROX_API_KEY: STACKROX_API_KEY
capability:
  consumes:
  - type: http
    namespace: stackrox-searchservice
    baseUri: https://{central-host}
    description: API Reference — SearchService business capability. Self-contained, no shared references.
    resources:
    - name: v1-search
      path: /v1/search
      operations:
      - name: search
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: categories
          in: query
          type: array
    - name: v1-search-autocomplete
      path: /v1/search/autocomplete
      operations:
      - name: autocomplete
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: categories
          in: query
          type: array
    - name: v1-search-metadata-options
      path: /v1/search/metadata/options
      operations:
      - name: options
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categories
          in: query
          type: array
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.STACKROX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stackrox-searchservice-rest
    port: 8080
    description: REST adapter for API Reference — SearchService. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/search
      name: v1-search
      description: REST surface for v1-search.
      operations:
      - method: GET
        name: search
        description: search
        call: stackrox-searchservice.search
        with:
          query: rest.query
          categories: rest.categories
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/search/autocomplete
      name: v1-search-autocomplete
      description: REST surface for v1-search-autocomplete.
      operations:
      - method: GET
        name: autocomplete
        description: autocomplete
        call: stackrox-searchservice.autocomplete
        with:
          query: rest.query
          categories: rest.categories
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/search/metadata/options
      name: v1-search-metadata-options
      description: REST surface for v1-search-metadata-options.
      operations:
      - method: GET
        name: options
        description: options
        call: stackrox-searchservice.options
        with:
          categories: rest.categories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stackrox-searchservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — SearchService. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: search
      description: search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackrox-searchservice.search
      with:
        query: tools.query
        categories: tools.categories
      outputParameters:
      - type: object
        mapping: $.
    - name: autocomplete
      description: autocomplete
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackrox-searchservice.autocomplete
      with:
        query: tools.query
        categories: tools.categories
      outputParameters:
      - type: object
        mapping: $.
    - name: options
      description: options
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stackrox-searchservice.options
      with:
        categories: tools.categories
      outputParameters:
      - type: object
        mapping: $.
