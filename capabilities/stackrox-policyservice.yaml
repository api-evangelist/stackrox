      path: /v1/policies/{policyId}/notifiers
      operations:
      - name: enabledisablepolicynotification
        method: PATCH
        description: EnableDisablePolicyNotification enables or disables notifications for a policy by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
