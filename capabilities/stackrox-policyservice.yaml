      operations:
      - name: listpolicies
        method: GET
        description: ListPolicies returns the list of policies.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: pagination.limit
          in: query
          type: integer
        - name: pagination.offset
          in: query
          type: integer
        - name: pagination.sort_option.field
          in: query
          type: string
        - name: pagination.sort_option.reversed
          in: query
          type: boolean
      - name: postpolicy
        method: POST
        description: PostPolicy creates a new policy.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-policies-dryrun
      path: /v1/policies/dryrun
      operations:
      - name: dryrunpolicy
        method: POST
        description: DryRunPolicy evaluates the given policy and returns any alerts without creating the policy.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-policies-reassess
      path: /v1/policies/reassess
      operations:
      - name: reassesspolicies
        method: POST
        description: ReassessPolicies reevaluates all the policies.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-policies-id
      path: /v1/policies/{id}
      operations:
      - name: getpolicy
        method: GET
        description: GetPolicy returns the requested policy by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletepolicy
        method: DELETE
        description: DeletePolicy removes a policy by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: putpolicy
        method: PUT
        description: PutPolicy modifies an existing policy.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: patchpolicy
        method: PATCH
        description: PatchPolicy edits an existing policy.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
