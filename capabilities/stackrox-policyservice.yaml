      path: /v1/policyCategories/{category}
      operations:
      - name: deletepolicycategory
        method: DELETE
        description: DeletePolicyCategory removes the given policy category.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: path
          type: string
          required: true
    - name: v1-policyCategories-oldCategory
