aid: stackrox
name: StackRox
description: StackRox is the open source upstream project for Red Hat Advanced Cluster Security for Kubernetes. It provides
  risk analysis, visibility, runtime alerts, and recommendations to proactively improve security by hardening containerized
  environments across build, deploy, and runtime stages. The platform performs compliance checking against standards like
  CIS, NIST, and PCI-DSS, and manages security policies across Kubernetes clusters.
